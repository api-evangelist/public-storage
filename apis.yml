aid: public-storage
name: Public Storage
description: >-
  Public Storage is an American real estate investment trust (REIT) that
  acquires, develops, owns, and operates self-storage facilities throughout the
  United States and Europe. Headquartered in Glendale, California, it is one of
  the largest self-storage operators in the world, serving customers via its
  online reservation system (eRental), mobile apps, and physical facilities. No
  public developer APIs or developer portal have been identified at this time.
